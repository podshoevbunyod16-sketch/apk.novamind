name: Build NovaMind Android APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        env:
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: novamind-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

  build-release:
    runs-on: ubuntu-latest
    needs: build-debug
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: novamind-release-apk
          path: app/build/outputs/apk/release/app-release.apk

  release:
    runs-on: ubuntu-latest
    needs: [build-debug, build-release]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: novamind-debug-apk
          path: ./artifacts/debug

      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: novamind-release-apk
          path: ./artifacts/release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/debug/app-debug.apk
            ./artifacts/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  eas-build:
    runs-on: ubuntu-latest
    needs: [build-debug, build-release]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        if: ${{ secrets.EXPO_TOKEN != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup EAS CLI
        if: ${{ secrets.EXPO_TOKEN != '' }}
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Verify EAS login
        if: ${{ secrets.EXPO_TOKEN != '' }}
        run: eas whoami

      - name: Trigger EAS Android build
        if: ${{ secrets.EXPO_TOKEN != '' }}
        run: |
          if [ -f "eas.json" ]; then
            eas build --platform android --non-interactive
          else
            echo "eas.json not found. Skipping EAS build. Add an Expo project to enable this step."
          fi
