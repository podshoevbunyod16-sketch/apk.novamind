name: Build NovaMind Full APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleRelease --no-daemon
      env:
        GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NovaMind-Full-APK
        path: app/build/outputs/apk/release/*.apk

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: NovaMind Full v${{ github.run_number }}
        body: |
          ## NovaMind Full — Android APK

          ### Установка:
          1. Скачай APK файл
          2. Разреши установку из неизвестных источников
          3. Установи и запусти

          ### Важно:
          - Для работы с AI нужен API ключ (Groq)
          - Получи ключ бесплатно на console.groq.com
        files: app/build/outputs/apk/release/app-release.apk
        draft: false
        prerelease: false
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
